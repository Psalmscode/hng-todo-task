<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Item Card</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <main class="page-wrapper">

    <article data-testid="test-todo-card" id="card">

      <div class="card-top">
        <div class="checkbox-wrap">
          <label for="complete-toggle" class="sr-only">Mark task as complete</label>
          <input
            type="checkbox"
            id="complete-toggle"
            data-testid="test-todo-complete-toggle"
            aria-label="Mark task as complete"
          />
        </div>
        <div class="title-area">
          <h2 data-testid="test-todo-title" id="task-title">
            HNG Intern Task &amp; Component Documentation
          </h2>
          <p data-testid="test-todo-description">
            Reviewed all directives given, i followed the directives strictly to the best of my knowlegde.
          </p>
        </div>
      </div>

      <div class="meta-row">
        <span
          data-testid="test-todo-priority"
          class="badge badge-priority-high"
          aria-label="Priority: High"
          id="priority-badge"
        >Priority</span>
        <span
          data-testid="test-todo-status"
          class="badge badge-status-progress"
          aria-label="Status: In Progress"
          id="status-badge"
        >In Progress</span>
      </div>

      <div class="date-area">
        <time data-testid="test-todo-due-date" datetime="2026-04-17T18:00:00Z">
          Due Apr 17, 2026
        </time>
        <span
          data-testid="test-todo-time-remaining"
          id="time-remaining"
          aria-live="polite"
          aria-label="Time remaining"
        >Calculating...</span>
      </div>

      <ul data-testid="test-todo-tags" role="list" aria-label="Tags">
        <li data-testid="test-todo-tag-work">Work</li>
        <li data-testid="test-todo-tag-urgent">Urgent</li>
        <li data-testid="test-todo-tag-design">Design</li>
      </ul>

      <div class="actions">
        <button
          data-testid="test-todo-edit-button"
          aria-label="Edit task"
          id="edit-btn"
        >Edit</button>
        <button
          data-testid="test-todo-delete-button"
          aria-label="Delete task"
          id="delete-btn"
        >Delete</button>
      </div>

    </article>

  </main>

  <script src="script.js"></script>
</body>
</html>
